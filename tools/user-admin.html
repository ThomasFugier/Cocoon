<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>WeSpice User Admin</title>
  <style>
    :root {
      --bg: #f5f1ea;
      --surface: #fffaf4;
      --surface-strong: #ffffff;
      --ink: #221823;
      --muted: #6f6570;
      --line: #ded4c8;
      --line-strong: #c7b9aa;
      --accent: #d83262;
      --accent-dark: #9e2146;
      --blue: #286f9f;
      --green: #247657;
      --yellow: #9b6c16;
      --danger: #b3261e;
      --danger-bg: #fff0ed;
      --shadow: 0 14px 34px rgba(35, 24, 35, 0.08);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: var(--bg);
      color: var(--ink);
      font-size: 14px;
      letter-spacing: 0;
    }

    button,
    input,
    select,
    textarea {
      font: inherit;
      letter-spacing: 0;
    }

    button {
      min-height: 38px;
      border: 1px solid var(--line-strong);
      border-radius: 6px;
      background: var(--surface-strong);
      color: var(--ink);
      cursor: pointer;
      font-weight: 700;
      padding: 8px 12px;
    }

    button:hover {
      border-color: var(--ink);
    }

    button:disabled {
      cursor: not-allowed;
      opacity: 0.45;
    }

    .primary {
      background: var(--ink);
      border-color: var(--ink);
      color: #fff;
    }

    .danger {
      background: var(--danger);
      border-color: var(--danger);
      color: #fff;
    }

    .ghost {
      background: transparent;
    }

    input,
    select,
    textarea {
      width: 100%;
      border: 1px solid var(--line-strong);
      border-radius: 6px;
      background: #fff;
      color: var(--ink);
      min-height: 38px;
      padding: 8px 10px;
    }

    textarea {
      min-height: 150px;
      resize: vertical;
      font-family: "Cascadia Mono", "SFMono-Regular", Consolas, monospace;
      font-size: 12px;
      line-height: 1.45;
    }

    .app {
      display: grid;
      grid-template-columns: minmax(300px, 390px) minmax(0, 1fr);
      min-height: 100vh;
    }

    .sidebar {
      border-right: 1px solid var(--line);
      background: var(--surface);
      min-height: 100vh;
      padding: 18px;
      display: grid;
      grid-template-rows: auto auto minmax(0, 1fr);
      gap: 14px;
    }

    .brand {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    .brand h1 {
      margin: 0;
      font-size: 20px;
      line-height: 1.1;
    }

    .status-pill {
      border: 1px solid var(--line-strong);
      border-radius: 999px;
      color: var(--green);
      font-size: 12px;
      font-weight: 800;
      padding: 5px 9px;
      white-space: nowrap;
    }

    .search {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 8px;
    }

    .list {
      overflow: auto;
      display: grid;
      align-content: start;
      gap: 8px;
      padding-right: 2px;
    }

    .user-row {
      display: grid;
      gap: 5px;
      width: 100%;
      text-align: left;
      background: #fff;
      border-color: var(--line);
      min-height: 74px;
      padding: 10px;
    }

    .user-row.active {
      border-color: var(--accent);
      box-shadow: inset 3px 0 0 var(--accent);
    }

    .user-main {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
    }

    .email,
    .mono {
      font-family: "Cascadia Mono", "SFMono-Regular", Consolas, monospace;
      overflow-wrap: anywhere;
    }

    .email {
      font-size: 13px;
      font-weight: 800;
    }

    .meta {
      color: var(--muted);
      font-size: 12px;
      line-height: 1.35;
    }

    .badge {
      border: 1px solid var(--line-strong);
      border-radius: 999px;
      color: var(--blue);
      font-size: 11px;
      font-weight: 800;
      padding: 3px 7px;
      white-space: nowrap;
    }

    .content {
      min-width: 0;
      padding: 20px;
      display: grid;
      grid-template-rows: auto minmax(0, 1fr);
      gap: 14px;
    }

    .notice {
      display: none;
      border: 1px solid var(--line-strong);
      border-left-width: 4px;
      border-radius: 6px;
      background: #fff;
      padding: 10px 12px;
      font-weight: 700;
    }

    .notice.show {
      display: block;
    }

    .notice.ok {
      border-left-color: var(--green);
    }

    .notice.error {
      border-left-color: var(--danger);
      background: var(--danger-bg);
    }

    .detail {
      min-width: 0;
      overflow: auto;
      display: grid;
      align-content: start;
      gap: 14px;
    }

    .empty {
      min-height: 320px;
      border: 1px dashed var(--line-strong);
      border-radius: 8px;
      display: grid;
      place-items: center;
      color: var(--muted);
      font-weight: 800;
      background: rgba(255, 255, 255, 0.45);
    }

    .header {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--surface-strong);
      box-shadow: var(--shadow);
      padding: 16px;
      display: grid;
      gap: 12px;
    }

    .header-top {
      display: flex;
      justify-content: space-between;
      gap: 16px;
      align-items: start;
    }

    .header h2 {
      margin: 0 0 5px;
      font-size: 24px;
      line-height: 1.1;
      overflow-wrap: anywhere;
    }

    .actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .tabs {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      border-top: 1px solid var(--line);
      padding-top: 12px;
    }

    .tab {
      min-height: 34px;
      padding: 7px 10px;
      border-color: transparent;
      color: var(--muted);
    }

    .tab.active {
      background: var(--ink);
      border-color: var(--ink);
      color: #fff;
    }

    .section {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--surface-strong);
      padding: 14px;
      display: grid;
      gap: 12px;
    }

    .section h3 {
      margin: 0;
      font-size: 15px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(190px, 1fr));
      gap: 10px;
    }

    .field {
      display: grid;
      gap: 5px;
    }

    label {
      color: var(--muted);
      font-size: 12px;
      font-weight: 800;
    }

    .metric {
      border: 1px solid var(--line);
      border-radius: 6px;
      min-height: 76px;
      padding: 10px;
      display: grid;
      align-content: center;
      gap: 4px;
      background: #fff;
    }

    .metric strong {
      font-size: 24px;
      line-height: 1;
    }

    .table-wrap {
      overflow: auto;
      border: 1px solid var(--line);
      border-radius: 6px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      min-width: 640px;
      background: #fff;
    }

    th,
    td {
      border-bottom: 1px solid var(--line);
      padding: 8px 9px;
      text-align: left;
      vertical-align: top;
      font-size: 12px;
      line-height: 1.35;
    }

    th {
      color: var(--muted);
      font-weight: 900;
      background: #fbf7f1;
    }

    tr:last-child td {
      border-bottom: 0;
    }

    pre {
      margin: 0;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: #151317;
      color: #f8f2e8;
      overflow: auto;
      padding: 12px;
      font-family: "Cascadia Mono", "SFMono-Regular", Consolas, monospace;
      font-size: 12px;
      line-height: 1.45;
      max-height: 620px;
    }

    .split {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
    }

    .danger-zone {
      border-color: #e2aaa2;
      background: #fff8f6;
    }

    .muted {
      color: var(--muted);
    }

    @media (max-width: 920px) {
      .app {
        grid-template-columns: 1fr;
      }

      .sidebar {
        min-height: auto;
        border-right: 0;
        border-bottom: 1px solid var(--line);
      }

      .list {
        max-height: 260px;
      }

      .split {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <main class="app">
    <aside class="sidebar">
      <div class="brand">
        <h1>WeSpice Admin</h1>
        <span id="statusPill" class="status-pill">Local</span>
      </div>

      <form id="searchForm" class="search">
        <input id="searchInput" type="search" placeholder="email, nom, user id" autocomplete="off">
        <button class="primary" type="submit">Chercher</button>
      </form>

      <div id="userList" class="list"></div>
    </aside>

    <section class="content">
      <div id="notice" class="notice"></div>
      <div id="detail" class="detail">
        <div class="empty">Cherche un utilisateur pour afficher sa fiche.</div>
      </div>
    </section>
  </main>

  <script>
    const ADMIN_TOKEN = "__ADMIN_TOKEN__";
    const COLOR_OPTIONS = [
      ["rose", "Rose velvet"],
      ["coral", "Corail nude"],
      ["apricot", "Abricot"],
      ["lavender", "Lavande"],
      ["mint", "Menthe"],
      ["sky", "Bleu doux"],
    ];
    const state = {
      activeTab: "overview",
      current: null,
      currentIdentifier: "",
      users: [],
    };

    const elements = {
      detail: document.querySelector("#detail"),
      list: document.querySelector("#userList"),
      notice: document.querySelector("#notice"),
      searchForm: document.querySelector("#searchForm"),
      searchInput: document.querySelector("#searchInput"),
      statusPill: document.querySelector("#statusPill"),
    };

    function setNotice(message, type = "ok") {
      elements.notice.textContent = message;
      elements.notice.className = `notice show ${type}`;
      window.clearTimeout(setNotice.timeout);
      setNotice.timeout = window.setTimeout(() => {
        elements.notice.className = "notice";
      }, 4200);
    }

    function escapeHtml(value) {
      return String(value ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function fmtDate(value) {
      if (!value) {
        return "-";
      }

      return new Date(value).toLocaleString();
    }

    function shortId(value) {
      if (!value) {
        return "-";
      }

      return `${value.slice(0, 8)}...${value.slice(-6)}`;
    }

    function json(value) {
      return JSON.stringify(value ?? null, null, 2);
    }

    async function api(path, options = {}) {
      const response = await fetch(path, {
        ...options,
        headers: {
          "Content-Type": "application/json",
          "X-Admin-Token": ADMIN_TOKEN,
          ...(options.headers ?? {}),
        },
      });
      const payload = await response.json().catch(() => ({}));

      if (!response.ok) {
        throw new Error(payload.error ?? `HTTP ${response.status}`);
      }

      return payload;
    }

    async function loadStatus() {
      const status = await api("/api/status");
      elements.statusPill.textContent = new URL(status.supabase_url).host.split(".")[0];
    }

    async function searchUsers(query = "") {
      elements.list.innerHTML = `<button class="user-row" disabled>Chargement...</button>`;
      const payload = await api(`/api/users?limit=200&search=${encodeURIComponent(query)}`);
      state.users = payload.users ?? [];
      renderUsers();
    }

    function renderUsers() {
      if (!state.users.length) {
        elements.list.innerHTML = `<button class="user-row" disabled>Aucun utilisateur trouve.</button>`;
        return;
      }

      elements.list.innerHTML = state.users.map((user) => {
        const active = state.current?.auth?.id === user.id ? " active" : "";
        return `
          <button class="user-row${active}" data-user-id="${escapeHtml(user.id)}">
            <span class="user-main">
              <span class="email">${escapeHtml(user.email || user.id)}</span>
              <span class="badge">${escapeHtml(user.provider || "auth")}</span>
            </span>
            <span class="meta">${escapeHtml(user.display_name || "Profil sans nom")} · ${user.couples} couple(s)</span>
            <span class="meta mono">${escapeHtml(shortId(user.id))} · ${escapeHtml(fmtDate(user.last_sign_in_at))}</span>
          </button>
        `;
      }).join("");
    }

    async function loadUser(identifier) {
      state.currentIdentifier = identifier;
      state.current = await api(`/api/user?identifier=${encodeURIComponent(identifier)}`);
      renderUsers();
      renderDetail();
    }

    function setTab(tab) {
      state.activeTab = tab;
      renderDetail();
    }

    function table(headers, rows) {
      if (!rows.length) {
        return `<div class="muted">Aucune donnee.</div>`;
      }

      return `
        <div class="table-wrap">
          <table>
            <thead><tr>${headers.map((header) => `<th>${escapeHtml(header.label)}</th>`).join("")}</tr></thead>
            <tbody>
              ${rows.map((row) => `
                <tr>
                  ${headers.map((header) => `<td>${escapeHtml(header.value(row) ?? "")}</td>`).join("")}
                </tr>
              `).join("")}
            </tbody>
          </table>
        </div>
      `;
    }

    function renderHeader(user) {
      const tabs = [
        ["overview", "Apercu"],
        ["profile", "Profil"],
        ["auth", "Auth"],
        ["danger", "Suppression"],
        ["raw", "JSON"],
      ];
      return `
        <div class="header">
          <div class="header-top">
            <div>
              <h2>${escapeHtml(user.auth.email || "Sans email")}</h2>
              <div class="meta mono">${escapeHtml(user.auth.id)}</div>
            </div>
            <div class="actions">
              <button id="refreshUser" type="button">Rafraichir</button>
              <button id="copyUserId" class="ghost" type="button">Copier ID</button>
            </div>
          </div>
          <div class="grid">
            <div class="metric"><span class="meta">Nom profil</span><strong>${escapeHtml(user.profile?.display_name ?? "-")}</strong></div>
            <div class="metric"><span class="meta">Provider</span><strong>${escapeHtml(user.auth.app_metadata?.provider ?? "-")}</strong></div>
            <div class="metric"><span class="meta">Couples</span><strong>${user.couples.length}</strong></div>
            <div class="metric"><span class="meta">Dernier login</span><strong style="font-size:14px">${escapeHtml(fmtDate(user.auth.last_sign_in_at))}</strong></div>
          </div>
          <div class="tabs">
            ${tabs.map(([key, label]) => `<button class="tab ${state.activeTab === key ? "active" : ""}" data-tab="${key}" type="button">${label}</button>`).join("")}
          </div>
        </div>
      `;
    }

    function overview(user) {
      const counts = user.state.counts ?? {};
      const coupleRows = user.couples.flatMap((entry) => entry.members.map((member) => ({
        couple_id: entry.couple?.id ?? entry.membership.couple_id,
        invite_code: entry.couple?.invite_code ?? "",
        user_id: member.user_id,
        email: member.profile?.id === user.auth.id ? user.auth.email : "",
        display_name: member.profile?.display_name ?? "",
        role: member.role,
        joined_at: member.joined_at,
      })));

      return `
        <div class="section">
          <h3>Activite</h3>
          <div class="grid">
            <div class="metric"><span class="meta">Votes</span><strong>${counts.desire_votes ?? 0}</strong></div>
            <div class="metric"><span class="meta">Messages</span><strong>${counts.authored_chat_messages ?? 0}</strong></div>
            <div class="metric"><span class="meta">Photos</span><strong>${counts.uploaded_chat_attachments ?? 0}</strong></div>
            <div class="metric"><span class="meta">Cartes perso</span><strong>${counts.custom_desire_cards ?? 0}</strong></div>
            <div class="metric"><span class="meta">Match reveals</span><strong>${counts.match_reveals ?? 0}</strong></div>
            <div class="metric"><span class="meta">Events notif</span><strong>${counts.notification_events ?? 0}</strong></div>
          </div>
        </div>

        <div class="section">
          <h3>Couple et membres</h3>
          ${table([
            { label: "couple_id", value: (row) => row.couple_id },
            { label: "invite", value: (row) => row.invite_code },
            { label: "user_id", value: (row) => row.user_id },
            { label: "nom", value: (row) => row.display_name },
            { label: "role", value: (row) => row.role },
            { label: "joined_at", value: (row) => fmtDate(row.joined_at) },
          ], coupleRows)}
        </div>

        <div class="split">
          <div class="section">
            <h3>Entitlements</h3>
            ${table([
              { label: "entitlement", value: (row) => row.entitlement },
              { label: "status", value: (row) => row.status },
              { label: "store", value: (row) => row.store },
              { label: "expires", value: (row) => fmtDate(row.expires_at) },
            ], user.state.purchase_entitlements ?? [])}
          </div>
          <div class="section">
            <h3>Unlocks</h3>
            ${table([
              { label: "category/feature", value: (row) => row.category ?? row.feature },
              { label: "source", value: (row) => row.source },
              { label: "at", value: (row) => fmtDate(row.unlocked_at) },
            ], [...(user.state.category_unlocks ?? []), ...(user.state.feature_unlocks ?? [])])}
          </div>
        </div>

        <div class="split">
          <div class="section">
            <h3>Notifications</h3>
            <pre>${escapeHtml(json(user.state.notification_preferences))}</pre>
          </div>
          <div class="section">
            <h3>Push tokens</h3>
            ${table([
              { label: "platform", value: (row) => row.platform },
              { label: "enabled", value: (row) => String(row.enabled) },
              { label: "last_seen", value: (row) => fmtDate(row.last_seen_at) },
              { label: "token", value: (row) => row.expo_push_token },
            ], user.state.push_tokens ?? [])}
          </div>
        </div>
      `;
    }

    function profileForm(user) {
      const profile = user.profile ?? {};
      return `
        <form id="profileForm" class="section">
          <h3>Profil app</h3>
          <div class="grid">
            <div class="field">
              <label for="displayName">Display name</label>
              <input id="displayName" name="display_name" value="${escapeHtml(profile.display_name ?? "")}">
            </div>
            <div class="field">
              <label for="profileColor">Couleur</label>
              <select id="profileColor" name="color">
                ${COLOR_OPTIONS.map(([value, label]) => `<option value="${value}" ${profile.color === value ? "selected" : ""}>${label}</option>`).join("")}
              </select>
            </div>
            <div class="field">
              <label for="statusEmoji">Status emoji</label>
              <input id="statusEmoji" name="status_emoji" value="${escapeHtml(profile.status_emoji ?? "")}">
            </div>
          </div>
          <div class="field">
            <label for="vibe">Vibe</label>
            <input id="vibe" name="vibe" value="${escapeHtml(profile.vibe ?? "")}">
          </div>
          <div class="actions">
            <button class="primary" type="submit">Enregistrer profil</button>
          </div>
        </form>
      `;
    }

    function authForm(user) {
      return `
        <form id="authForm" class="section">
          <h3>Auth Supabase</h3>
          <div class="grid">
            <div class="field">
              <label for="authEmail">Email</label>
              <input id="authEmail" name="email" value="${escapeHtml(user.auth.email ?? "")}">
            </div>
            <div class="field">
              <label for="authConfirm">Confirmation</label>
              <input id="authConfirm" name="confirm" placeholder="${escapeHtml(user.auth.email ?? user.auth.id)}">
            </div>
          </div>
          <div class="split">
            <div class="field">
              <label for="userMetadata">user_metadata JSON</label>
              <textarea id="userMetadata" name="user_metadata">${escapeHtml(json(user.auth.user_metadata ?? {}))}</textarea>
            </div>
            <div class="field">
              <label for="appMetadata">app_metadata JSON</label>
              <textarea id="appMetadata" name="app_metadata">${escapeHtml(json(user.auth.app_metadata ?? {}))}</textarea>
            </div>
          </div>
          <div class="actions">
            <button class="primary" type="submit">Enregistrer auth</button>
          </div>
        </form>
      `;
    }

    function dangerZone(user) {
      return `
        <div class="section danger-zone">
          <h3>Suppression compte</h3>
          <div class="grid">
            <div class="metric"><span class="meta">Couples touches</span><strong>${user.couples.length}</strong></div>
            <div class="metric"><span class="meta">Photos upload</span><strong>${user.state.counts?.uploaded_chat_attachments ?? 0}</strong></div>
          </div>
          <div class="actions" style="justify-content:flex-start">
            <button id="deletePlan" type="button">Voir dry-run</button>
          </div>
          <pre id="deletePlanOutput">Aucun dry-run lance.</pre>
          <div class="field">
            <label for="deleteConfirm">Confirmation suppression</label>
            <input id="deleteConfirm" placeholder="${escapeHtml(user.auth.email ?? user.auth.id)}">
          </div>
          <div class="actions">
            <button id="deleteUser" class="danger" type="button">Supprimer utilisateur</button>
          </div>
        </div>
      `;
    }

    function rawJson(user) {
      return `<div class="section"><h3>JSON complet</h3><pre>${escapeHtml(json(user))}</pre></div>`;
    }

    function renderDetail() {
      const user = state.current;

      if (!user) {
        elements.detail.innerHTML = `<div class="empty">Cherche un utilisateur pour afficher sa fiche.</div>`;
        return;
      }

      let body = "";
      if (state.activeTab === "overview") body = overview(user);
      if (state.activeTab === "profile") body = profileForm(user);
      if (state.activeTab === "auth") body = authForm(user);
      if (state.activeTab === "danger") body = dangerZone(user);
      if (state.activeTab === "raw") body = rawJson(user);

      elements.detail.innerHTML = renderHeader(user) + body;
    }

    function readJsonTextarea(id) {
      const value = document.querySelector(id).value.trim();

      if (!value) {
        return {};
      }

      return JSON.parse(value);
    }

    elements.searchForm.addEventListener("submit", async (event) => {
      event.preventDefault();
      try {
        await searchUsers(elements.searchInput.value);
      } catch (error) {
        setNotice(error.message, "error");
      }
    });

    elements.list.addEventListener("click", async (event) => {
      const row = event.target.closest("[data-user-id]");
      if (!row) return;

      try {
        await loadUser(row.dataset.userId);
      } catch (error) {
        setNotice(error.message, "error");
      }
    });

    elements.detail.addEventListener("click", async (event) => {
      const tab = event.target.closest("[data-tab]");
      if (tab) {
        setTab(tab.dataset.tab);
        return;
      }

      if (event.target.id === "refreshUser") {
        try {
          await loadUser(state.current?.auth?.id ?? state.currentIdentifier);
          setNotice("Fiche rechargee.");
        } catch (error) {
          setNotice(error.message, "error");
        }
        return;
      }

      if (event.target.id === "copyUserId") {
        await navigator.clipboard.writeText(state.current.auth.id);
        setNotice("User id copie.");
        return;
      }

      if (event.target.id === "deletePlan") {
        try {
          const payload = await api("/api/user/delete-plan", {
            body: JSON.stringify({ identifier: state.current.auth.id }),
            method: "POST",
          });
          document.querySelector("#deletePlanOutput").textContent = json(payload.plan);
        } catch (error) {
          setNotice(error.message, "error");
        }
        return;
      }

      if (event.target.id === "deleteUser") {
        const confirm = document.querySelector("#deleteConfirm").value.trim();
        try {
          const result = await api("/api/user", {
            body: JSON.stringify({ confirm, identifier: state.current.auth.id }),
            method: "DELETE",
          });
          setNotice(`Utilisateur supprime: ${result.email || result.user_id}`);
          state.current = null;
          await searchUsers(elements.searchInput.value);
          renderDetail();
        } catch (error) {
          setNotice(error.message, "error");
        }
      }
    });

    elements.detail.addEventListener("submit", async (event) => {
      event.preventDefault();

      if (event.target.id === "profileForm") {
        const formData = new FormData(event.target);
        try {
          await api("/api/user/profile", {
            body: JSON.stringify({
              changes: Object.fromEntries(formData.entries()),
              identifier: state.current.auth.id,
            }),
            method: "PATCH",
          });
          await loadUser(state.current.auth.id);
          setNotice("Profil mis a jour.");
        } catch (error) {
          setNotice(error.message, "error");
        }
      }

      if (event.target.id === "authForm") {
        const formData = new FormData(event.target);
        try {
          await api("/api/user/auth", {
            body: JSON.stringify({
              changes: {
                app_metadata: readJsonTextarea("#appMetadata"),
                confirm: formData.get("confirm"),
                email: formData.get("email"),
                user_metadata: readJsonTextarea("#userMetadata"),
              },
              identifier: state.current.auth.id,
            }),
            method: "PATCH",
          });
          await loadUser(formData.get("email") || state.current.auth.id);
          setNotice("Auth mis a jour.");
        } catch (error) {
          setNotice(error.message, "error");
        }
      }
    });

    (async function init() {
      try {
        await loadStatus();
        await searchUsers();
      } catch (error) {
        setNotice(error.message, "error");
      }
    })();
  </script>
</body>
</html>
